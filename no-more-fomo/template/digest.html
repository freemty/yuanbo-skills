<!DOCTYPE html>
<html data-theme="light" data-lang="{{DIGEST_LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>No More FOMO — {{DIGEST_DATE}}</title>
  <style>
    /* ===== Design Tokens ===== */
    :root,
    [data-theme="light"] {
      --bg: #f6f4f0;
      --bg-secondary: #edeae4;
      --surface: #ffffff;
      --surface-warm: #faf8f4;
      --surface-elevated: #ffffff;
      --border: #ddd6c8;
      --border-subtle: #ebe6dc;
      --text: #1a1612;
      --text-secondary: #4a4035;
      --text-muted: #8a7d6b;
      --accent: #9a6c1e;
      --accent-hover: #7a5516;
      --accent-subtle: rgba(154, 108, 30, 0.08);
      --green: #2d7a45;
      --green-subtle: rgba(45, 122, 69, 0.08);
      --shadow-sm: 0 1px 2px rgba(26, 22, 18, 0.04);
      --shadow-md: 0 2px 8px rgba(26, 22, 18, 0.06), 0 1px 2px rgba(26, 22, 18, 0.04);
      --radius: 8px;
      --radius-sm: 5px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", Menlo, "Cascadia Code", "Fira Code", monospace;
    }

    [data-theme="dark"] {
      --bg: #0f1114;
      --bg-secondary: #181b21;
      --surface: #1e2228;
      --surface-warm: #242830;
      --surface-elevated: #282d36;
      --border: #2e343e;
      --border-subtle: #262c35;
      --text: #e8eaf0;
      --text-secondary: #a0a8b8;
      --text-muted: #606878;
      --accent: #c4b08a;
      --accent-hover: #dbc8a0;
      --accent-subtle: rgba(196, 176, 138, 0.1);
      --green: #5cb87a;
      --green-subtle: rgba(92, 184, 122, 0.1);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
      --radius: 10px;
      --radius-sm: 6px;
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    a:hover {
      color: var(--accent-hover);
    }

    /* ===== Header ===== */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(12px);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
    }

    @media (prefers-reduced-motion: reduce) {
      .header {
        backdrop-filter: none;
        background: var(--surface);
      }
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 880px;
      margin: 0 auto;
      flex-wrap: wrap;
      gap: 12px;
    }

    .back-link {
      display: inline-block;
      font-size: 11px;
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
      margin-bottom: 2px;
      transition: color 0.15s ease;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .title span {
      color: var(--accent);
    }

    .meta {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-top: 1px;
      letter-spacing: 0.02em;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ===== View Switcher ===== */
    .view-switcher {
      display: flex;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 2px;
      gap: 1px;
    }

    .view-btn {
      background: none;
      border: none;
      padding: 5px 12px;
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--text-muted);
      cursor: pointer;
      border-radius: calc(var(--radius-sm) - 2px);
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .view-btn.active {
      background: var(--surface-elevated);
      color: var(--text);
      box-shadow: var(--shadow-sm);
      font-weight: 600;
    }

    .view-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    /* ===== Theme & Lang Buttons ===== */
    .theme-btn,
    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .theme-btn:hover,
    .lang-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border-color: var(--border);
    }

    /* ===== Highlights ===== */
    .highlights {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      margin: 20px auto;
      padding: 18px 22px;
      max-width: 880px;
      box-shadow: var(--shadow-sm);
    }

    .highlights-title {
      color: var(--accent);
      text-transform: uppercase;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
      opacity: 0.85;
    }

    .highlights ol {
      padding-left: 22px;
      font-size: 13px;
      line-height: 1.75;
    }

    .highlights li {
      margin-bottom: 6px;
      padding-left: 4px;
    }

    .highlights li::marker {
      color: var(--accent);
      font-weight: 700;
    }

    .highlights li b {
      color: var(--text);
    }

    .highlights li a {
      font-size: 11px;
      font-family: var(--font-mono);
    }

    /* ===== Content Layout ===== */
    .content {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    .content-wrap {
      display: block;
    }

    .main-content {
      min-width: 0;
    }

    .sections-container {
      display: block;
    }

    /* ===== Sidebar Nav ===== */
    .sidebar-nav {
      display: none;
    }

    .sidebar-nav a {
      display: block;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: all 0.15s ease;
      font-weight: 450;
    }

    .sidebar-nav a:hover {
      background: var(--accent-subtle);
      color: var(--accent);
    }

    .sidebar-nav a.active {
      color: var(--accent);
      font-weight: 600;
      background: var(--accent-subtle);
    }

    /* ===== Section ===== */
    .section {
      margin-bottom: 32px;
    }

    .section-header {
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.01em;
    }

    .section-count {
      background: var(--accent-subtle);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    /* ===== Item ===== */
    .item {
      padding: 12px 0 14px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-title {
      font-weight: 650;
      font-size: 14px;
      line-height: 1.4;
      letter-spacing: -0.01em;
    }

    .item-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      line-height: 1.65;
    }

    .item-meta {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      margin-top: 8px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .item-links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      padding: 1px 0;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s ease;
    }

    .item-links a:hover {
      color: var(--accent-hover);
      border-bottom-color: var(--accent-hover);
    }

    /* ===== Item Empty ===== */
    .item-empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 12px;
      padding: 12px 0;
    }

    /* ===== Badge ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 550;
      letter-spacing: 0.02em;
    }

    .badge-source {
      background: var(--accent-subtle);
      color: var(--accent);
    }

    .badge-green {
      background: var(--green-subtle);
      color: var(--green);
    }

    /* ===== Podcast ===== */
    .podcast-summary {
      background: var(--surface-warm);
      border-left: 2px solid var(--accent);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 10px 14px;
      margin-top: 8px;
    }

    .tldr {
      font-weight: 600;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-secondary);
    }


    /* ===== Footer ===== */
    .footer {
      border-top: 1px solid var(--border-subtle);
      padding: 16px 24px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      max-width: 880px;
      margin: 0 auto;
      letter-spacing: 0.02em;
    }

    /* ===== View: Newspaper (default) ===== */
    .view-newspaper .sidebar-nav {
      display: none;
    }

    /* ===== View: Sidebar ===== */
    .view-sidebar .content-wrap {
      display: flex;
      gap: 24px;
    }

    .view-sidebar .sidebar-nav {
      display: block;
      width: 170px;
      flex-shrink: 0;
      position: sticky;
      top: 80px;
      align-self: flex-start;
      padding-top: 8px;
    }

    /* ===== View: Grid ===== */
    .view-grid .sidebar-nav {
      display: none;
    }

    .view-grid .sections-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .view-grid .section {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 0;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s ease;
    }

    .view-grid .section:hover {
      box-shadow: var(--shadow-md);
    }

    .view-grid .section.wide {
      grid-column: 1 / -1;
    }

    .view-grid .item-desc {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .header {
        padding: 12px 16px;
      }

      .header-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .highlights {
        margin: 12px 16px;
      }

      .content {
        padding: 0 16px 24px;
      }

      .view-grid .sections-container {
        grid-template-columns: 1fr;
      }

      .view-sidebar .content-wrap {
        flex-direction: column;
      }

      .view-sidebar .sidebar-nav {
        width: 100%;
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div>
        <a href="./index.html" class="back-link" data-zh="← 归档" data-en="← Archive">← 归档</a>
        <div class="title">No More <span>FOMO</span></div>
        <div class="meta">{{DIGEST_DATE}} | {{DIGEST_META}}</div>
      </div>
      <div class="controls">
        <div class="view-switcher">
          <button class="view-btn active" data-zh="报纸" data-en="Newspaper" onclick="setView('newspaper')">报纸</button>
          <button class="view-btn" data-zh="侧栏" data-en="Sidebar" onclick="setView('sidebar')">侧栏</button>
          <button class="view-btn" data-zh="网格" data-en="Grid" onclick="setView('grid')">网格</button>
        </div>
        <button class="theme-btn" onclick="toggleTheme()">🌓</button>
        <button class="lang-btn" onclick="toggleLang()">中/EN</button>
      </div>
    </div>
  </div>
  <div class="highlights">{{DIGEST_HIGHLIGHTS}}</div>
  <div class="content view-newspaper" id="mainContent">
    <div class="content-wrap">
      <nav class="sidebar-nav">{{DIGEST_SIDEBAR_NAV}}</nav>
      <div class="main-content">
        <div class="sections-container">{{DIGEST_SECTIONS}}</div>
      </div>
    </div>
  </div>
  <div class="footer">{{DIGEST_FOOTER}}</div>
  <script>
    function setView(view) {
      var el = document.getElementById('mainContent');
      el.className = 'content view-' + view;
      var btns = document.querySelectorAll('.view-btn');
      btns.forEach(function(btn) {
        var btnView = btn.getAttribute('onclick').match(/'(\w+)'/)[1];
        if (btnView === view) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
      try { localStorage.setItem('fomo-view', view); } catch(e) {}
    }

    function toggleTheme() {
      var html = document.documentElement;
      var current = html.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      try { localStorage.setItem('fomo-theme', next); } catch(e) {}
    }

    function toggleLang() {
      var path = window.location.pathname;
      var filename = path.split('/').pop();
      if (filename.match(/-zh\.html$/)) {
        window.location.href = filename.replace(/-zh\.html$/, '.html');
      } else {
        window.location.href = filename.replace(/\.html$/, '-zh.html');
      }
    }

    function setLang(lang) {
      document.documentElement.setAttribute('data-lang', lang);
      var els = document.querySelectorAll('[data-zh][data-en]');
      els.forEach(function(el) {
        el.textContent = el.getAttribute('data-' + lang);
      });
      try { localStorage.setItem('fomo-lang', lang); } catch(e) {}
    }

    /* ===== Init ===== */
    (function() {
      var savedView, savedTheme, savedLang;
      try {
        savedView = localStorage.getItem('fomo-view');
        savedTheme = localStorage.getItem('fomo-theme');
        savedLang = localStorage.getItem('fomo-lang');
      } catch(e) {}

      if (savedView) {
        setView(savedView);
      }

      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }

      var defaultLang = document.documentElement.getAttribute('data-lang') || 'zh';
      var lang = savedLang || defaultLang;
      setLang(lang);
    })();
  </script>
</body>
</html>
